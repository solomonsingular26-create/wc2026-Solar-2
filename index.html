<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>World Cup 2026 Predictor</title>
  <link rel="stylesheet" href="styles.css?v=2" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">🇨🇦 🇲🇽 🇺🇸 · <span id="header-stage">GROUP STAGE</span></div>
      <div class="header-row">
        <h1>World Cup 2026 Predictor</h1>
        <span class="ball">⚽</span>
      </div>
    </header>

    <main id="screen" class="screen">
      <p class="loading">Loading…</p>
    </main>

    <nav class="nav">
      <button class="nav-btn active" data-tab="fixtures"><span>⚽</span>Fixtures</button>
      <button class="nav-btn" data-tab="leaderboard"><span>🏆</span>Leaderboard</button>
      <button class="nav-btn" data-tab="manage"><span>⚙️</span>Manage</button>
    </nav>
  </div>

  <!-- Firebase (compat build = simple global `firebase`, no build tools) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
